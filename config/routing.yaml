# Relay routing map (SPEC C6) — hot-reloaded on edit; no restart needed.
# cache_threshold 0.755 is the dev-tuned operating point of the full matcher
# (similarity + answer-determining guards; scripts/eval_cache_traps.py,
# ADR-0009/0010) — the guards, not the threshold, carry trap rejection.
# Tier 3 semantic matching is disabled outright (exact repeats still hit).
# Chains never downgrade (ADR-0007): same-tier alternate provider first
# (mockb = second mock instance, the outage-drill fallback), then tier+1.
tiers:
  1: { chain: [mock/cheap-a, mockb/cheap-a, mock/mid-b], cache_threshold: 0.755 }
  2: { chain: [mock/mid-b, mockb/mid-b, mock/top-c], cache_threshold: 0.755 }
  3: { chain: [mock/top-c, mockb/top-c], cache_threshold: disabled }

classifier:
  min_confidence: 0.6
  on_low_confidence: promote_one_tier

verification:
  sample_rate: 0.15
  judge: mock/top-c
  agree_threshold: 4

cache_ttl:
  stable: 86400
  temporal: 3600
  no_cache: 0
